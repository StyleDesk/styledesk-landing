<!--
  StyleDesk Reels Outro Card — 1080×1920 (9:16)
  3-second end card. Drop into Descript at the end of every Reel.

  Reels safe zones (Instagram covers these with UI):
    Top 220px, Bottom 400px, Right 180px
  Critical content lives in y: 220–1520, x: ~80–900.

  See DESIGN-SYSTEM.md for the full spec.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1920" width="1080" height="1920" role="img" aria-label="StyleDesk.ai outro — link in bio, June 2026">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3a0018"/>
      <stop offset="55%" stop-color="#2a0012"/>
      <stop offset="100%" stop-color="#1a000b"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f0c6cf"/>
      <stop offset="50%" stop-color="#c9a064"/>
      <stop offset="100%" stop-color="#f0c6cf"/>
    </linearGradient>
    <!-- ambient: faint top wash (atmospheric, behind everything) -->
    <radialGradient id="ambient" cx="50%" cy="28%" r="75%">
      <stop offset="0%" stop-color="#c9a064" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#c9a064" stop-opacity="0"/>
    </radialGradient>
    <!-- crown halo: focused glow centered behind the logo (cy~47% = y=900) -->
    <radialGradient id="crownHalo" cx="50%" cy="47%" r="32%">
      <stop offset="0%" stop-color="#c9a064" stop-opacity="0.22"/>
      <stop offset="50%" stop-color="#7c1f36" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#c9a064" stop-opacity="0"/>
    </radialGradient>
    <!-- structure rings: replicates Instagram Structure filter at 50 — concentric
         bands of darkening that emanate from a slightly bright center, getting denser
         and stronger toward the edges (~24 alternating bands). userSpaceOnUse keeps
         rings circular on the 9:16 canvas. -->
    <radialGradient id="structureRings" cx="540" cy="900" r="1150" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#c9a064" stop-opacity="0.06"/>
      <stop offset="3%"   stop-color="#000000" stop-opacity="0.12"/>
      <stop offset="6%"   stop-color="#000000" stop-opacity="0"/>
      <stop offset="9%"   stop-color="#000000" stop-opacity="0.14"/>
      <stop offset="12%"  stop-color="#000000" stop-opacity="0"/>
      <stop offset="15%"  stop-color="#000000" stop-opacity="0.16"/>
      <stop offset="18%"  stop-color="#000000" stop-opacity="0"/>
      <stop offset="21%"  stop-color="#000000" stop-opacity="0.18"/>
      <stop offset="24%"  stop-color="#000000" stop-opacity="0"/>
      <stop offset="27%"  stop-color="#000000" stop-opacity="0.20"/>
      <stop offset="30%"  stop-color="#000000" stop-opacity="0"/>
      <stop offset="33%"  stop-color="#000000" stop-opacity="0.22"/>
      <stop offset="36%"  stop-color="#000000" stop-opacity="0"/>
      <stop offset="39%"  stop-color="#000000" stop-opacity="0.24"/>
      <stop offset="42%"  stop-color="#000000" stop-opacity="0"/>
      <stop offset="45%"  stop-color="#000000" stop-opacity="0.27"/>
      <stop offset="48%"  stop-color="#000000" stop-opacity="0"/>
      <stop offset="51%"  stop-color="#000000" stop-opacity="0.30"/>
      <stop offset="54%"  stop-color="#000000" stop-opacity="0"/>
      <stop offset="57%"  stop-color="#000000" stop-opacity="0.34"/>
      <stop offset="60%"  stop-color="#000000" stop-opacity="0"/>
      <stop offset="63%"  stop-color="#000000" stop-opacity="0.38"/>
      <stop offset="66%"  stop-color="#000000" stop-opacity="0.05"/>
      <stop offset="69%"  stop-color="#000000" stop-opacity="0.44"/>
      <stop offset="72%"  stop-color="#000000" stop-opacity="0.10"/>
      <stop offset="75%"  stop-color="#000000" stop-opacity="0.50"/>
      <stop offset="80%"  stop-color="#000000" stop-opacity="0.20"/>
      <stop offset="85%"  stop-color="#000000" stop-opacity="0.58"/>
      <stop offset="92%"  stop-color="#000000" stop-opacity="0.70"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.85"/>
    </radialGradient>

    <!-- crown logo gradients (mirror styledesk-logo-square.svg) -->
    <linearGradient id="crown" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#932748"/>
      <stop offset="100%" stop-color="#551024"/>
    </linearGradient>
    <linearGradient id="crownGloss" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.35"/>
      <stop offset="48%" stop-color="#ffffff" stop-opacity="0.08"/>
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="goldDot" cx="28%" cy="22%" r="95%">
      <stop offset="0%" stop-color="#fff0b8"/>
      <stop offset="25%" stop-color="#f2cc7a"/>
      <stop offset="70%" stop-color="#b4833a"/>
      <stop offset="100%" stop-color="#5e3e0c"/>
    </radialGradient>
    <linearGradient id="pinkBar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffe3ea"/>
      <stop offset="55%" stop-color="#f0c6cf"/>
      <stop offset="100%" stop-color="#c1909b"/>
    </linearGradient>
    <linearGradient id="pinkGloss" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- background layers — DO NOT EDIT -->
  <rect width="1080" height="1920" fill="url(#bg)"/>
  <rect width="1080" height="1920" fill="url(#ambient)"/>
  <rect width="1080" height="1920" fill="url(#crownHalo)"/>
  <!-- IG Structure 50 + Vignette 25 baked-in: concentric ring banding + hard corner darkening -->
  <rect width="1080" height="1920" fill="url(#structureRings)"/>

  <!-- hairline gold inset border — lives inside the Reels safe zone so IG UI never clips it -->
  <rect x="80" y="240" width="920" height="1260" fill="none" stroke="#c9a064" stroke-opacity="0.18" stroke-width="1"/>

  <!-- logo crown — scale 1.15 (~252px tall crown), centered at (540, 900) -->
  <g transform="translate(246 633) scale(1.15)">
    <path d="M143 235 L143 168 L194 204 L256 122 L318 204 L369 168 L369 235 Z" fill="url(#crown)" stroke="#fadfe4" stroke-width="5" stroke-linejoin="round"/>
    <path d="M143 235 L143 168 L194 204 L256 122 L318 204 L369 168 L369 235 Z" fill="url(#crownGloss)" stroke="none"/>
    <rect x="143" y="240" width="226" height="30" rx="15" fill="url(#pinkBar)"/>
    <rect x="147" y="242" width="218" height="13" rx="6.5" fill="url(#pinkGloss)"/>
    <rect x="164" y="282" width="184" height="26" rx="13" fill="#9a7a80" opacity="0.92"/>
    <rect x="184" y="318" width="144" height="23" rx="11.5" fill="#7a5a60" opacity="0.78"/>
    <circle cx="256" cy="122" r="18" fill="url(#goldDot)"/>
    <circle cx="143" cy="168" r="18" fill="url(#goldDot)"/>
    <circle cx="369" cy="168" r="18" fill="url(#goldDot)"/>
    <ellipse cx="249" cy="115" rx="6.5" ry="4" fill="#ffffff" opacity="0.7"/>
    <ellipse cx="136" cy="161" rx="6.5" ry="4" fill="#ffffff" opacity="0.7"/>
    <ellipse cx="362" cy="161" rx="6.5" ry="4" fill="#ffffff" opacity="0.7"/>
  </g>

  <!-- wordmark: STYLEDESK.AI in Playfair Display (matches landing page .hero h1) -->
  <text x="540" y="1210" font-family="'Playfair Display', Georgia, serif" font-size="120" font-weight="700" text-anchor="middle" letter-spacing="-2" fill="url(#gold)">STYLEDESK.AI</text>

  <!-- refined divider — long thin gold rule + tiny rotated diamond (couture detail) -->
  <line x1="380" y1="1320" x2="525" y2="1320" stroke="#c9a064" stroke-opacity="0.40" stroke-width="0.8"/>
  <rect x="535" y="1315" width="10" height="10" transform="rotate(45 540 1320)" fill="#c9a064" fill-opacity="0.90"/>
  <line x1="555" y1="1320" x2="700" y2="1320" stroke="#c9a064" stroke-opacity="0.40" stroke-width="0.8"/>

  <!-- CTA — small caps gold, generous tracking -->
  <text x="540" y="1430" font-family="'Helvetica Neue', 'Inter', -apple-system, sans-serif" font-size="26" font-weight="300" fill="#c9a064" text-anchor="middle" letter-spacing="8">BOOK A DEMO  ·  LINK IN BIO</text>

  <!-- heritage footer — Roman numeral established date, low-opacity gold -->
  <text x="540" y="1485" font-family="'Helvetica Neue', 'Inter', -apple-system, sans-serif" font-size="18" font-weight="300" fill="#c9a064" fill-opacity="0.5" text-anchor="middle" letter-spacing="6">EST. MMXXVI</text>
</svg>
